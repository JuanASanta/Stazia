services:
  db:
    image: postgres:16
    container_name: stazia_db
    restart: always
    environment:
      POSTGRES_DB: stazia
      POSTGRES_USER: stazia_user
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: